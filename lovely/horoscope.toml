[manifest]
version = "1.0.0"
dump_lua = true
priority = 2

    # Patch SMODS for horoscope CardArea
[[patches]]
[patches.pattern]
target = '''=[SMODS _ "src/utils.lua"]'''
pattern = '''
-- TARGET: add your own CardAreas for joker evaluation
'''
position = "after"
payload = '''
if Maximus_config.horoscopes then
    table.insert(t, G.mxms_horoscope)
end
'''
match_indent = true
times = 1


# Derived from SDM_0's Stuff

    # Prevent "USE" button on Horoscopes in deck
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = '''
end
if card.ability.consumeable then
'''
position = "after"
payload = '''
    if card.ability.set == "Horoscope" or card.config.center.key == 'c_mxms_ophiucus' then
        return {
        n=G.UIT.ROOT, config = {padding = 0, colour = G.C.CLEAR}, nodes={
            {n=G.UIT.C, config={padding = 0.15, align = 'cl'}, nodes={
            {n=G.UIT.R, config={align = 'cl'}, nodes={
                sell
            }},
            }},
        }}
    end
'''
match_indent = true


    # Apply Sagittarius effect
[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''
if G.GAME.round_resets.temp_reroll_cost then G.GAME.round_resets.temp_reroll_cost = nil; calculate_reroll_cost(true) end
'''
position = "after"
payload = '''
if G.GAME.mxms_sagittarius_bonus then G.GAME.round_resets.temp_reroll_cost = 0; calculate_reroll_cost(true); G.GAME.mxms_sagittarius_bonus = false end -- Added by Maximus
'''
match_indent = true
times = 1


    # Horoscope Stat Tracking
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''
joker_usage = {},
consumeable_usage = {},
voucher_usage = {},
hand_usage = {},
deck_usage = {},
'''
position = "after"
payload = '''
horoscope_completions = {}, -- Added by Maximus
'''
match_indent = true
times = 1


    # Horoscope Stat Menu 
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = '''
{
    label = localize('b_stat_vouchers'),
    tab_definition_function = create_UIBox_usage,
    tab_definition_function_args = {'voucher_usage', 'Voucher'},
},
'''
position = "after"
payload = '''
{
    -- Added by Maximus
    label = localize('b_mxms_stat_horoscopes'),
    tab_definition_function = create_UIBox_usage,
    tab_definition_function_args = {'horoscope_completions', 'Horoscope'},
},
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = '''
_type == 'consumeable_usage' and localize('ph_stat_consumable') or
'''
position = "after"
payload = '''
_type == 'horoscope_completions' and (Maximus and (Maximus_config.horoscope and localize('ph_mxms_stat_horoscope') or localize('ph_mxms_stat_horoscope')) or localize('k_none')) or -- Added by Maximus
'''
match_indent = true
times = 1


    #Force no undiscovered text on bypass
[[patches]]
[patches.pattern]
target = '''card.lua'''
pattern = '''
((self.area ~= G.jokers and self.area ~= G.consumeables and self.area) or not self.area) then
'''
position = '''at'''
payload = '''
((self.area ~= G.jokers and self.area ~= G.consumeables and self.area ~= G.mxms_horoscope and self.area) or not self.area) then
'''
match_indent = true
times = 1